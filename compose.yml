services:
  webapp:
    build:
      context: "web"
      target: "production"
      args:
        NEXT_PUBLIC_NOVU_APP_IDENTIFIER: ${NEXT_PUBLIC_NOVU_APP_IDENTIFIER:-}
        NEXT_PUBLIC_NOVU_BACKEND_URL: ${NEXT_PUBLIC_NOVU_BACKEND_URL:-}
        NEXT_PUBLIC_NOVU_WS_URL: ${NEXT_PUBLIC_NOVU_WS_URL:-}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
        NOVU_SECRET_KEY: ${NOVU_SECRET_KEY:-}
        S3_ENDPOINT: ${S3_ENDPOINT:-}
        TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-}
    ports:
      - "${WEBAPP_PORT:-18000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://0.0.0.0:3000"]
      interval: 3s
      timeout: 5s
      retries: 30
    env_file: [".env"]
    depends_on:
      postgres-webapp:
        condition: "service_healthy"
    volumes:
      - "./web/logs:/app/logs"
  webapp-migration-runner:
    build:
      context: "web"
      dockerfile: "Dockerfile"
      target: "development"
      args:
        NEXT_PUBLIC_NOVU_APP_IDENTIFIER: ${NEXT_PUBLIC_NOVU_APP_IDENTIFIER:-}
        NEXT_PUBLIC_NOVU_BACKEND_URL: ${NEXT_PUBLIC_NOVU_BACKEND_URL:-}
        NEXT_PUBLIC_NOVU_WS_URL: ${NEXT_PUBLIC_NOVU_WS_URL:-}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
        NOVU_SECRET_KEY: ${NOVU_SECRET_KEY:-}
        S3_ENDPOINT: ${S3_ENDPOINT:-}
        TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-}
    env_file: [".env"]
    profiles:
      - "migration-runner"
    depends_on:
      postgres-webapp:
        condition: "service_healthy"
  webapp-worker:
    build:
      context: "web"
      dockerfile: "Dockerfile.worker"
    env_file: [".env"]
    depends_on:
      postgres-webapp:
        condition: "service_healthy"
      temporal:
        condition: "service_healthy"
    volumes:
      - "webapp-worker_storage:/storage"
      - "./web/logs:/app/logs"
  postgres-webapp:
    image: "postgres:18.1-alpine"
    environment:
      POSTGRES_USER: "${DB_USER:-}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-}"
      POSTGRES_DB: "${DB_NAME:-}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-} -d ${DB_NAME:-}"]
      interval: 3s
      timeout: 5s
      retries: 30
    volumes:
      - "postgres-webapp_data:/var/lib/postgresql"
  postgres-temporal:
    image: "postgres:18.1-alpine"
    environment:
      POSTGRES_USER: "temporal"
      POSTGRES_PASSWORD: "temporal"
      POSTGRES_DB: "temporal"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 3s
      timeout: 5s
      retries: 30
    volumes:
      - "postgres-temporal_data:/var/lib/postgresql"
  temporal:
    image: "temporalio/auto-setup:1.29"
    environment:
      DB: "postgres12"
      DB_PORT: "5432"
      POSTGRES_USER: "temporal"
      POSTGRES_PWD: "temporal"
      POSTGRES_SEEDS: "postgres-temporal"
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_CLI_ADDRESS: "temporal:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 3s
      timeout: 5s
      retries: 30
    depends_on:
      postgres-temporal:
        condition: "service_healthy"
  temporal-ui:
    image: "temporalio/ui:2.43.0"
    environment:
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_CORS_ORIGINS: "http://localhost:8233"
      TEMPORAL_UI_PORT: "8233"
      TEMPORAL_HIDE_LOGS: "true" # Don't re-print logs from Temporal service
    ports:
      - "${TEMPORAL_UI_PORT:-18001}:8233"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:8233 || exit 1"]
    depends_on:
      temporal:
        condition: "service_healthy"
  rustfs:
    image: "rustfs/rustfs:latest"
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "${RUSTFS_PORT:-18002}:9000"
      - "${RUSTFS_CONSOLE_PORT:-18003}:9001"
    env_file: [".env"]
    environment:
      RUSTFS_VOLUMES: "/data/rustfs"
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: true
      RUSTFS_EXTERNAL_ADDRESS: ":${RUSTFS_PORT:-18002}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: "${RUSTFS_INITIAL_ACCESS_KEY:-}"
      RUSTFS_SECRET_KEY: "${RUSTFS_INITIAL_SECRET_KEY:-}"
      RUSTFS_OBS_LOGGER_LEVEL: "info"
      RUSTFS_TLS_PATH: "/opt/tls"
      RUSTFS_OBJECT_CACHE_ENABLE: true
      RUSTFS_OBJECT_CACHE_TTL_SECS: 300
    profiles:
      - "rustfs"
    volumes:
      - "rustfs_data:/data/rustfs"
      - "rustfs_logs:/app/logs"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health",
        ]
      interval: 3s
      timeout: 5s
      retries: 30
  # RustFS volume permissions fixer service
  rustfs-volume-permission-helper:
    image: "alpine"
    volumes:
      - "rustfs_data:/data"
      - "rustfs_logs:/logs"
    command: >
      sh -c "
        chown -R 10001:10001 /data /logs &&
        echo 'Volume permissions fixed' &&
        exit 0
      "
    restart: "on-failure"
    profiles:
      - "rustfs"
  rustfs-init-bucket-helper:
    image: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
    env_file: [".env"]
    depends_on:
      rustfs:
        condition: "service_healthy"
    entrypoint: >
      sh -c "
        mc alias set rustfs $S3_ENDPOINT $S3_ACCESS_KEY $S3_SECRET_KEY
        mc mb rustfs/$S3_BUCKET --ignore-existing
        mc anonymous set none rustfs/$S3_BUCKET
        exit 0
      "
    restart: "on-failure"
    profiles:
      - "rustfs"
  selenium:
    image: "selenium/standalone-docker:4.40.0"
    environment:
      SE_NODE_SESSION_TIMEOUT: "600"
      SE_START_VNC: "false"
    volumes:
      - "./selenium/config.toml:/opt/selenium/docker.toml:ro"
      - "selenium_assets:/opt/selenium/assets"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "/opt/bin/check-grid.sh"]
      interval: 5s
    profiles:
      - "selenium"
volumes:
  selenium_assets:
  postgres-temporal_data:
  postgres-webapp_data:
  rustfs_data:
  rustfs_logs:
  webapp-worker_storage:
