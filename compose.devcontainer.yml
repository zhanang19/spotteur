services:
  devcontainer:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    hostname: devcontainer
    ports:
      - "${WEBAPP_PORT:-18000}:3000"
      - "${WEBAPP_EMAIL_PORT:-18005}:3001"
      - "${WEBAPP_NOVU_PORT:-18006}:3002"
    env_file:
      - .env
    volumes:
      # Forwards the local Docker socket to the container.
      # - /var/run/docker.sock:/var/run/docker-host.sock
      # Update this to wherever you want VS Code to mount the folder of your project
      - ./:/workspaces/spotteur:cached
      - webapp-worker_storage:${TEMPORAL_DEFAULT_STORAGE_DIR:-/storage}

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Uncomment the next four lines if you will use a ptrace-based debuggers like C++, Go, and Rust.
    # cap_add:
    #  - SYS_PTRACE
    # security_opt:
    #   - seccomp:unconfined

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)
  inbucket:
    image: "inbucket/inbucket:sha-6eff554"
    environment:
      INBUCKET_MAILBOXNAMING: "full"
      INBUCKET_SMTP_ADDR: "0.0.0.0:25"
      INBUCKET_POP3_ADDR: "0.0.0.0:110"
      INBUCKET_LOGLEVEL: "warn"
    ports:
      - "${INBUCKET_PORT:-18004}:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:9000/status || exit 1"]
    restart: "unless-stopped"

volumes:
  webapp-worker_storage:
