name: Lint

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "web/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Dependencies
        run: |
          npm ci

      - name: Run Lint
        run: |
          npm run lint

      - name: Run build
        run: |
          npm run build
