name: Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: /opt/spotteur-scripts/deploy.sh ${{ github.ref }} ${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
