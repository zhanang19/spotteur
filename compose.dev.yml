services:
  webapp:
    build:
      context: "web"
      target: "development"
    ports:
      - "${WEBAPP_EMAIL_PORT:-18005}:3001"
      - "${WEBAPP_NUVO_PORT:-18006}:3002"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://0.0.0.0:3000"]
      interval: 3s
      timeout: 5s
      retries: 30
    volumes:
      - "./web:/app"
      - "webapp_deps:/app/node_modules/"
      - "webapp_next:/app/.next/"
      - "./:/workspace" # Workspace for devcontainer
      - "webapp_deps:/workspace/web/node_modules/"
      - "webapp_next:/workspace/web/.next/"
  webapp-worker:
    build:
      context: "web"
      dockerfile: "Dockerfile.worker"
    volumes:
      - "./web:/app"
      - "webapp_deps:/app/node_modules/"
  webapp-script-runner:
    volumes:
      - "./web:/app"
      - "webapp_deps:/app/node_modules/"
  inbucket:
    image: "inbucket/inbucket:sha-6eff554"
    environment:
      INBUCKET_MAILBOXNAMING: "full"
      INBUCKET_SMTP_ADDR: "0.0.0.0:25"
      INBUCKET_POP3_ADDR: "0.0.0.0:110"
      INBUCKET_LOGLEVEL: "warn"
    ports:
      - "${INBUCKET_PORT:-18004}:9000"
    healthcheck:
      test:
        ["CMD-SHELL", "wget --spider http://localhost:9000/status || exit 1"]
volumes:
  webapp_deps:
  webapp_next:
