version: "3"
dotenv:
  - .env
silent: true
vars:
  DOCKER_COMPOSE_SCRIPT:
    sh: |
      if [ "{{.APP_ENV}}" = "development" ]; then
        echo "docker compose -f compose.yml -f compose.dev.yml{{ if eq .FILESYSTEM_DISK "rustfs" }} --profile rustfs{{ end }}{{if eq .USE_EXTERNAL_SELENIUM "false"}} --profile selenium{{ end }}"
      else
        echo "docker compose -f compose.yml{{ if eq .FILESYSTEM_DISK "rustfs" }} --profile rustfs{{ end }}{{if eq .USE_EXTERNAL_SELENIUM "false"}} --profile selenium{{ end }}"
      fi
  IMAGE_TAG:
    sh: echo "{{.IMAGE_TAG | default "latest"}}"
  SPOTTEUR_DOCKER_IMAGE_NAMESPACE:
    sh: echo "{{.SPOTTEUR_DOCKER_IMAGE_NAMESPACE | default "ghcr.io/spotteur"}}"
  DOCKER_BUILD_ARGS:
    sh: echo "NPM_CONFIG_REGISTRY={{.NPM_CONFIG_REGISTRY | default "https://registry.npmjs.org"}}"
tasks:
  image:build:
    cmds:
      - "docker build --build-arg={{.DOCKER_BUILD_ARGS}} --target=production --tag={{.SPOTTEUR_DOCKER_IMAGE_NAMESPACE}}/spotteur:{{.IMAGE_TAG}} web"
  image:push:
    cmds:
      - "docker push {{.SPOTTEUR_DOCKER_IMAGE_NAMESPACE}}/spotteur:{{.IMAGE_TAG}}"
  up:
    cmds:
      # Only trigger build in development mode
      - '{{.DOCKER_COMPOSE_SCRIPT}} up --detach{{if eq .APP_ENV "development" }} --build{{ end }} --remove-orphans'
      - task: "migrate"
  down:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} down"
  status:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} ps --format 'table {{\"{{.Name}}\"}}\t{{\"{{.Image}}\"}}\t{{\"{{.Status}}\"}}' --all"
  logs:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} logs --follow --tail=100 {{.CLI_ARGS}}"
  lint:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} exec webapp npm run lint"
  db:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} exec postgres-webapp psql -U {{.DB_USER}} -d {{.DB_NAME}}"
  stop:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} stop"
  migrate:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} exec webapp task migrate"
  ssh:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} exec webapp bash"
  create-user:
    cmds:
      - "{{.DOCKER_COMPOSE_SCRIPT}} exec webapp task create-user"
